# Grafana Dashboard Provisioning
# Titan-Takeaway Training Platform
# Auto-loads dashboards from filesystem

apiVersion: 1

providers:
  - name: 'Titan Takeaway Dashboards'
    orgId: 1
    folder: 'Titan Takeaway'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: true
  
  - name: 'OpenTelemetry Collector'
    orgId: 1
    folder: 'Infrastructure'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/otel
      foldersFromFilesStructure: false
